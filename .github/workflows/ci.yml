name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build library targets
        run: |
          swift build --target CIDR
          swift build --target CIDRConfig
          swift build --target CIDRPOSIX
          swift build --target CIDRNIO

      - name: Run test suite
        run: ./scripts/test.sh

  build-and-test-linux:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build library targets
        run: |
          swift build --target CIDR
          swift build --target CIDRConfig
          swift build --target CIDRPOSIX
          swift build --target CIDRNIO

      - name: Run test suite
        run: ./scripts/test.sh

  benchmark-thresholds:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build benchmark target
        working-directory: Benchmarks
        run: swift build -c release --target CIDRBenchmarkTarget

      - name: Check benchmark thresholds
        working-directory: Benchmarks
        run: swift package benchmark thresholds check --target CIDRBenchmarkTarget
