name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swift-cidr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux (swift:6.3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: swift --version

      - name: Resolve package graph
        run: swift package resolve

      - name: Build library targets
        run: |
          swift build --target CIDR
          swift build --target CIDRPOSIX
          swift build --target CIDRNIO

      - name: Test
        run: ./scripts/test.sh

  linux-benchmark-build:
    name: linux benchmark build (swift:6.3)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: swift --version

      - name: Build benchmark targets
        run: |
          swift build --package-path Benchmarks --product CIDRProfileTarget
          ./scripts/benchmarks.sh build
          CIDR_BENCHMARK_TARGET=CIDRCPUBenchmarkTarget ./scripts/benchmarks.sh build
          CIDR_BENCHMARK_TARGET=CIDRNIOBenchmarkTarget ./scripts/benchmarks.sh build
